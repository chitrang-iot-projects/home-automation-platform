name: CD

# Deploys run only from main. Frontends (customer-pwa, admin-portal) are
# deployed by Vercel's own Git integration, so no frontend job is needed here.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret not set — skipping API deploy."
            exit 0
          fi
          # Fail the job if Render rejects the hook call
          curl --fail --silent --show-error -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
